name: Update Profile Animations

permissions: 
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"  # Runs every midnight
  workflow_dispatch:      # Allows manual run

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the code
      - uses: actions/checkout@v3

      # 2. Generate Snake Animation
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 3. Push Snake to "output" branch
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4. Generate 3D Contrib Graph
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      
      # 5. Commit 3D Graph to main branch
      - name: Commit & Push
        run: |
          git config user.name pypi-ahmad
          git config user.email pypi.ahmad@gmail.com
          git add -A .
          git commit -m "Generated 3D graph"
          git push